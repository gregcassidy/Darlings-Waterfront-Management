<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darling's Waterfront Tickets</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<header class="app-header">
  <div class="brand">🎵 Darling's Waterfront Tickets <span>2026 Season</span></div>
  <div class="header-right">
    <span class="user-info" id="userDisplay"></span>
    <a href="/admin.html" id="adminLink" class="admin-link hidden">Admin</a>
    <button class="btn btn-outline btn-sm" onclick="Auth.logout()">Sign Out</button>
  </div>
</header>

<div class="container page-content">

  <div id="closedBanner" class="alert alert-warning hidden">
    <strong>Submissions are closed.</strong> The preference submission window is not currently open.
    You can view your previous selections below.
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('preferences', this)">Submit Preferences</button>
    <button class="tab-btn" onclick="showTab('mytickets', this)">My Tickets</button>
  </div>

  <!-- ═══ PREFERENCES TAB ═══ -->
  <div id="tab-preferences">

    <div class="grid-2" style="gap:1.5rem; align-items:start;">

      <!-- Left: Your Selections -->
      <div>
        <div class="card">
          <div class="card-header">
            <h2>Your Top 5 Picks</h2>
            <span id="selectionCount" class="badge badge-gray">0 / 5</span>
          </div>

          <div class="pref-slots" id="prefSlots">
            <!-- rendered by app.js -->
          </div>

          <button class="btn btn-primary w-full" id="submitBtn" onclick="App.submitPreferences()" disabled>
            Submit Preferences
          </button>
          <div id="submitMsg" style="margin-top:.75rem;font-size:.85rem;text-align:center;"></div>
        </div>
      </div>

      <!-- Right: Concert List -->
      <div>
        <div class="card">
          <div class="card-header">
            <h2>2026 Concerts</h2>
            <span class="text-sm text-muted">Click to select</span>
          </div>
          <div id="concertListLoading" class="loading">
            <div class="loading-spinner"></div>
          </div>
          <div class="concert-list" id="concertList"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══ MY TICKETS TAB ═══ -->
  <div id="tab-mytickets" class="hidden">
    <div class="card">
      <div class="card-header">
        <h2>My Ticket Assignments</h2>
      </div>
      <div id="ticketsLoading" class="loading hidden">
        <div class="loading-spinner"></div>
      </div>
      <div id="ticketsList"></div>
    </div>
  </div>

</div>

<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
<script>
  function showTab(name, btn) {
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.remove('hidden');
    btn.classList.add('active');
    if (name === 'mytickets') App.loadMyTickets();
  }
  App.init();
</script>
</body>
</html>
